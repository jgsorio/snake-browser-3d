<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Orbitron', monospace; }
  canvas { display: block; }

  #ui { position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; }

  #score-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px;
    background: rgba(0,255,170,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,255,170,0.15);
  }
  #score-bar span { color: #00ffaa; font-size: 14px; letter-spacing: 2px; }
  #score-val, #hiscore-val { color: #fff; font-weight: 700; font-size: 18px; }

  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(6px);
    pointer-events: all;
    transition: opacity 0.3s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay h1 {
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    color: #00ffaa;
    text-shadow: 0 0 30px #00ffaa88, 0 0 60px #00ffaa44;
    letter-spacing: 6px;
    margin-bottom: 8px;
  }
  #overlay .subtitle {
    color: #447766; font-size: 13px; letter-spacing: 3px; margin-bottom: 40px;
  }
  #final-score { color: #fff; font-size: 22px; margin-bottom: 8px; display: none; }
  #final-score span { color: #00ffaa; }

  #btn-start {
    padding: 14px 48px;
    background: transparent;
    border: 2px solid #00ffaa;
    color: #00ffaa;
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px #00ffaa33;
    margin-top: 16px;
  }
  #btn-start:hover {
    background: #00ffaa;
    color: #0a0a0f;
    box-shadow: 0 0 40px #00ffaaaa;
  }
  .hint { color: #334455; font-size: 11px; letter-spacing: 2px; margin-top: 24px; }

  #paused {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #00ffaa; font-size: 32px; letter-spacing: 6px;
    text-shadow: 0 0 20px #00ffaa;
    display: none;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="score-bar">
    <span>SCORE &nbsp;<span id="score-val">0</span></span>
    <span>SNAKE 3D</span>
    <span>BEST &nbsp;<span id="hiscore-val">0</span></span>
  </div>
</div>

<div id="overlay">
  <h1>SNAKE 3D</h1>
  <div class="subtitle">NEON EDITION</div>
  <div id="final-score">PONTUAÇÃO: <span id="fs-val">0</span></div>
  <button id="btn-start">JOGAR</button>
  <div class="hint">WASD / SETAS — ESPAÇO para pausar</div>
</div>

<div id="paused">⏸ PAUSADO</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ── Config ────────────────────────────────────────────────────────────────
const GRID = 20;
const HALF = GRID / 2 - 0.5;
const BASE_INTERVAL = 200;
const MIN_INTERVAL  = 80;

// ── State ─────────────────────────────────────────────────────────────────
let snake, dir, nextDir, food, score, hiScore = 0;
let gameRunning = false, paused = false;
let lastStep = 0, interval = BASE_INTERVAL;
let snakeMeshes = [], foodMesh, foodLight;

// ── Three.js setup ────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 30, 60);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 22, 18);
camera.lookAt(0, 0, 0);

// Lights
scene.add(new THREE.AmbientLight(0x112233, 1.5));
const sun = new THREE.DirectionalLight(0x00ffaa, 1.2);
sun.position.set(5, 15, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
scene.add(sun);
const rimLight = new THREE.DirectionalLight(0x0044ff, 0.5);
rimLight.position.set(-10, 5, -10);
scene.add(rimLight);

// Floor
const floorGeo = new THREE.PlaneGeometry(GRID, GRID);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0d1f1a, roughness: 0.9, metalness: 0.1,
  transparent: true, opacity: 0.95
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.51;
floor.receiveShadow = true;
scene.add(floor);

// Grid lines
const grid = new THREE.GridHelper(GRID, GRID, 0x1a3a3a, 0x1a3a3a);
grid.position.y = -0.5;
scene.add(grid);

// Border walls (visual)
const wallMat = new THREE.MeshStandardMaterial({
  color: 0x00ffaa, emissive: 0x003322, transparent: true, opacity: 0.15
});
const wallGeos = [
  [GRID, 0.3, 0.05, 0, 0.15, -HALF - 0.5],
  [GRID, 0.3, 0.05, 0, 0.15,  HALF + 0.5],
  [0.05, 0.3, GRID, -HALF - 0.5, 0.15, 0],
  [0.05, 0.3, GRID,  HALF + 0.5, 0.15, 0],
];
wallGeos.forEach(([w,h,d,x,y,z]) => {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wallMat);
  m.position.set(x,y,z);
  scene.add(m);
});

// ── Geometries (reused) ───────────────────────────────────────────────────
const segGeo  = new THREE.BoxGeometry(0.88, 0.88, 0.88);
const headGeo = new THREE.BoxGeometry(0.94, 0.94, 0.94);
const foodGeo = new THREE.SphereGeometry(0.42, 16, 16);

function makeMat(color, emissive, emissiveInt = 0.6) {
  return new THREE.MeshStandardMaterial({
    color, emissive, emissiveIntensity: emissiveInt,
    roughness: 0.3, metalness: 0.4
  });
}

// ── Food ──────────────────────────────────────────────────────────────────
function spawnFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.z}`));
  let fx, fz;
  do {
    fx = Math.round(Math.random() * (GRID - 1)) - Math.floor(GRID / 2);
    fz = Math.round(Math.random() * (GRID - 1)) - Math.floor(GRID / 2);
  } while (occupied.has(`${fx},${fz}`));
  food = { x: fx, z: fz };

  if (foodMesh) scene.remove(foodMesh);
  if (foodLight) scene.remove(foodLight);

  foodMesh = new THREE.Mesh(foodGeo, makeMat(0xff6622, 0xff3300, 1.2));
  foodMesh.position.set(fx, 0, fz);
  foodMesh.castShadow = true;
  scene.add(foodMesh);

  foodLight = new THREE.PointLight(0xff4400, 2, 4);
  foodLight.position.set(fx, 1, fz);
  scene.add(foodLight);
}

// ── Snake mesh management ─────────────────────────────────────────────────
function rebuildSnakeMeshes() {
  snakeMeshes.forEach(m => scene.remove(m));
  snakeMeshes = [];
  snake.forEach((seg, i) => {
    const isHead = i === 0;
    const t = i / Math.max(snake.length - 1, 1);
    const color = new THREE.Color().lerpColors(
      new THREE.Color(0x00ffaa), new THREE.Color(0x004433), t
    );
    const emissive = new THREE.Color().lerpColors(
      new THREE.Color(0x00ffaa), new THREE.Color(0x001a0d), t
    );
    const mesh = new THREE.Mesh(
      isHead ? headGeo : segGeo,
      makeMat(color, emissive, isHead ? 0.8 : 0.3)
    );
    mesh.position.set(seg.x, 0, seg.z);
    mesh.castShadow = true;
    scene.add(mesh);
    snakeMeshes.push(mesh);
  });
}

function updateSnakeMeshes() {
  // Grow: rebuild all (cheap for small snakes)
  while (snakeMeshes.length > snake.length) {
    scene.remove(snakeMeshes.pop());
  }
  while (snakeMeshes.length < snake.length) {
    const i = snakeMeshes.length;
    const mesh = new THREE.Mesh(segGeo, makeMat(0x004433, 0x001a0d, 0.3));
    mesh.castShadow = true;
    scene.add(mesh);
    snakeMeshes.push(mesh);
  }
  snake.forEach((seg, i) => {
    const mesh = snakeMeshes[i];
    mesh.position.set(seg.x, 0, seg.z);
    // Update head emissive intensity gently
    if (i === 0) {
      mesh.material.emissiveIntensity = 0.8 + Math.sin(Date.now() * 0.005) * 0.2;
    }
  });
}

// ── Game logic ────────────────────────────────────────────────────────────
function initGame() {
  snake = [{ x: 0, z: 0 }, { x: -1, z: 0 }, { x: -2, z: 0 }];
  dir = { x: 1, z: 0 };
  nextDir = { x: 1, z: 0 };
  score = 0;
  interval = BASE_INTERVAL;
  updateScoreUI();
  rebuildSnakeMeshes();
  spawnFood();
}

function step() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, z: snake[0].z + dir.z };

  // Wall collision
  if (head.x < -HALF - 0.5 || head.x > HALF + 0.5 ||
      head.z < -HALF - 0.5 || head.z > HALF + 0.5) {
    return endGame();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.z === head.z)) return endGame();

  snake.unshift(head);

  if (head.x === food.x && head.z === food.z) {
    score++;
    if (score > hiScore) hiScore = score;
    interval = Math.max(MIN_INTERVAL, BASE_INTERVAL - Math.floor(score / 5) * 10);
    updateScoreUI();
    spawnFood();
  } else {
    snake.pop();
  }

  updateSnakeMeshes();
}

function endGame() {
  gameRunning = false;
  document.getElementById('final-score').style.display = 'block';
  document.getElementById('fs-val').textContent = score;
  document.getElementById('btn-start').textContent = 'JOGAR NOVAMENTE';
  document.getElementById('overlay').classList.remove('hidden');
}

function updateScoreUI() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('hiscore-val').textContent = hiScore;
}

// ── Controls ──────────────────────────────────────────────────────────────
const DIRS = {
  ArrowUp:    { x: 0, z: -1 }, w: { x: 0, z: -1 }, W: { x: 0, z: -1 },
  ArrowDown:  { x: 0, z:  1 }, s: { x: 0, z:  1 }, S: { x: 0, z:  1 },
  ArrowLeft:  { x:-1, z:  0 }, a: { x:-1, z:  0 }, A: { x:-1, z:  0 },
  ArrowRight: { x: 1, z:  0 }, d: { x: 1, z:  0 }, D: { x: 1, z:  0 },
};

document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.key === 'p' || e.key === 'P') && gameRunning) {
    paused = !paused;
    document.getElementById('paused').style.display = paused ? 'block' : 'none';
    return;
  }
  const d = DIRS[e.key];
  if (!d || !gameRunning || paused) return;
  // Prevent 180°
  if (d.x === -dir.x && d.z === -dir.z) return;
  nextDir = d;
});

// ── Render loop ───────────────────────────────────────────────────────────
let clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const now = performance.now();

  if (gameRunning && !paused && now - lastStep > interval) {
    lastStep = now;
    step();
  }

  // Food pulse
  if (foodMesh) {
    const pulse = Math.sin(now * 0.004) * 0.08 + 1;
    foodMesh.scale.setScalar(pulse);
    foodLight.intensity = 1.5 + Math.sin(now * 0.006) * 0.8;
  }

  // Gentle camera bob
  camera.position.y = 22 + Math.sin(now * 0.0005) * 0.3;

  renderer.render(scene, camera);
}

// ── Start button ──────────────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('final-score').style.display = 'none';
  initGame();
  gameRunning = true;
  lastStep = performance.now();
});

// ── Resize ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
